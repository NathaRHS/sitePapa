<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 200" width="500" height="200">
  <defs>
    <linearGradient id="nGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B1538;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6B0F2D;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- N shape in burgundy -->
  <g>
    <!-- Left vertical bar of N -->
    <rect x="20" y="30" width="35" height="140" rx="8" fill="url(#nGradient)"/>
    
    <!-- Diagonal bar of N -->
    <polygon points="55,170 55,30 190,180 190,180 125,30" fill="url(#nGradient)"/>
    
    <!-- Right vertical bar of N -->
    <rect x="155" y="30" width="35" height="140" rx="8" fill="url(#nGradient)"/>
  </g>
  
  <!-- Bag handle in burgundy -->
  <path d="M 220 50 Q 300 -20 380 50" stroke="#8B1538" stroke-width="28" fill="none" stroke-linecap="round"/>
  
  <!-- B bag body in gray -->
  <g>
    <!-- Main rounded rectangle for bag -->
    <rect x="280" y="60" width="180" height="120" rx="40" fill="#505050"/>
    
    <!-- B letters in white -->
    <text x="330" y="110" font-size="55" font-weight="bold" font-family="Arial, sans-serif" fill="white">B</text>
    <text x="330" y="155" font-size="55" font-weight="bold" font-family="Arial, sans-serif" fill="white">B</text>
  </g>
</svg>